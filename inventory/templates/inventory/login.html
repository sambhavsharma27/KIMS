<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMS Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="card shadow login-card border-0">
        <div class="card-body p-5">
            <h2 class="text-center mb-4 fw-bold text-primary">KIMS</h2>
            <h5 class="text-center text-muted mb-4">Kothi Inventory System</h5>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger py-2 text-center" role="alert">
                        Invalid username or password.
                    </div>
                {% endif %}
                
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Log In</button>
            </form>
            
        </div>
    </div>

</body>
</html>
